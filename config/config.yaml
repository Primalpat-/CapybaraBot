adb:
  adb_path: C:/platform-tools/adb.exe
  command_timeout: 30
  connect_timeout: 10
  host: 127.0.0.1
  port: 5555
  reconnect_attempts: 3
  reconnect_delay: 2.0
bot:
  app_package: com.habby.capybara
  clear_calibration_on_start: false
  faction: Star Alliance
  logged_out_restart_delay: 600
  max_beatable_defender_power: 0
  max_consecutive_errors: 5
  max_defeats_before_skip: 2
  max_idle_retries: 8
  max_monuments: 0
  max_recovery_attempts: 5
  max_total_errors: 20
  recovery_interval_seconds: 120
  stagnation_timeout_seconds: 1800
  stuck_timeout: 60
contest:
  flip_velocity_threshold: 2.0
  max_duration_seconds: 300
  poll_interval_seconds: 8
  power_vulnerability_threshold: 5000
  recent_flip_seconds: 120
  stable_seconds: 120
coordinates:
  action_button:
    x: 540
    y: 1600
  back_button:
    x: 100
    y: 100
  close_popup:
    x: 950
    y: 400
  minimap_button:
    x: 980
    y: 180
  minimap_center:
    x: 540
    y: 960
  skip_battle:
    x: 540
    y: 1750
dashboard:
  host: 0.0.0.0
  max_log_entries: 500
  port: 8080
input:
  swipe_duration_max: 400
  swipe_duration_min: 200
  tap_jitter: 5
ocr:
  confidence_threshold: 0.4
  debug_save: false
  enabled: true
persistence:
  check_recheck_interval_seconds: 600
  post_capture_watch_seconds: 300
  recheck_interval_seconds: 900
  save_interval_seconds: 60
  well_defended_threshold: 0
screen:
  height: 1600
  width: 900
timing:
  after_swipe: 1.2
  after_tap: 0.8
  battle_poll_interval: 2
  error_recovery_wait: 3.0
  jitter_factor: 0.3
  loading_max_retries: 6
  loading_wait: 5
  minimap_open: 1.5
  monument_popup_wait: 1.5
  navigation_poll_interval: 2.0
  screen_transition: 2
vision:
  input_token_cost_per_million: 3.0
  max_image_dimension: 1024
  max_tokens: 1024
  model: claude-sonnet-4-20250514
  output_token_cost_per_million: 15.0
  temperature: 0.0
