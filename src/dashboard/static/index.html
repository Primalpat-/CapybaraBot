<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapybaraBot Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            background: #16213e;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #0f3460;
        }
        .header h1 { font-size: 1.4em; color: #e94560; }
        .header .status-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85em;
        }
        .status-running { background: #1b5e20; color: #a5d6a7; }
        .status-paused { background: #e65100; color: #ffcc80; }
        .status-stopped { background: #b71c1c; color: #ef9a9a; }
        .status-error { background: #880e4f; color: #f48fb1; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .panel {
            background: #16213e;
            border-radius: 8px;
            padding: 16px;
            border: 1px solid #0f3460;
        }
        .panel h2 {
            font-size: 1em;
            color: #e94560;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #0f3460;
        }
        .full-width { grid-column: 1 / -1; }

        .controls { display: flex; gap: 10px; flex-wrap: wrap; }
        .controls button {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9em;
        }
        .btn-pause { background: #e65100; color: white; }
        .btn-resume { background: #1b5e20; color: white; }
        .btn-stop { background: #b71c1c; color: white; }
        .controls button:hover { opacity: 0.85; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }
        .stat-card {
            background: #1a1a2e;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
        }
        .stat-card .value {
            font-size: 1.6em;
            font-weight: bold;
            color: #e94560;
        }
        .stat-card .label {
            font-size: 0.75em;
            color: #8899aa;
            margin-top: 4px;
        }

        .screenshot-container {
            text-align: center;
        }
        .screenshot-container img {
            max-width: 100%;
            max-height: 500px;
            border-radius: 6px;
            border: 1px solid #0f3460;
        }
        .no-image {
            color: #555;
            padding: 60px;
            font-style: italic;
        }

        .log-container {
            max-height: 350px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.8em;
            line-height: 1.6;
        }
        .log-entry { padding: 2px 0; border-bottom: 1px solid #0f3460; }
        .log-entry .time { color: #666; margin-right: 8px; }
        .log-entry .level-INFO { color: #81c784; }
        .log-entry .level-WARNING { color: #ffb74d; }
        .log-entry .level-ERROR { color: #e57373; }
        .log-entry .level-DEBUG { color: #64b5f6; }

        .action-log {
            max-height: 250px;
            overflow-y: auto;
            font-size: 0.85em;
            line-height: 1.8;
        }
        .action-entry { padding: 2px 0; border-bottom: 1px solid #0f3460; }
        .action-entry .time { color: #666; margin-right: 8px; }

        .monuments-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .monument-card {
            background: #1a1a2e;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            border-left: 4px solid #555;
        }
        .monument-card.status-enemy { border-left-color: #e57373; }
        .monument-card.status-friendly { border-left-color: #81c784; }
        .monument-card .slot-label { font-weight: bold; font-size: 1.1em; }
        .monument-card .status-text { font-size: 0.85em; margin: 6px 0; }
        .monument-card .status-text.enemy { color: #e57373; }
        .monument-card .status-text.friendly { color: #81c784; }
        .monument-card .status-text.unknown { color: #888; }
        .monument-card .owner { font-size: 0.85em; margin-bottom: 4px; }
        .monument-card .timer { font-size: 0.8em; color: #8899aa; }
        .monument-card .garrison-info { font-size: 0.8em; color: #b0bec5; margin-top: 4px; }
        .monument-card .garrison-info .power-value { color: #e94560; font-weight: bold; }
        .monument-card .defenders-list { font-size: 0.75em; color: #90a4ae; margin-top: 2px; }
        .monument-card .flip-count { font-size: 0.75em; color: #ffb74d; margin-top: 4px; }
        .monument-card .flip-velocity { font-size: 0.75em; color: #ce93d8; }
        .monument-card .contest-badge {
            display: inline-block;
            background: #e65100;
            color: #fff;
            font-size: 0.65em;
            padding: 1px 6px;
            border-radius: 8px;
            margin-left: 4px;
            font-weight: bold;
        }
        .monument-card .tier-badge {
            display: inline-block;
            font-size: 0.65em;
            padding: 1px 6px;
            border-radius: 8px;
            margin-left: 4px;
            font-weight: bold;
        }
        .tier-badge.tier-0 { background: #1b5e20; color: #a5d6a7; }
        .tier-badge.tier-1 { background: #b71c1c; color: #ef9a9a; }
        .tier-badge.tier-2 { background: #e65100; color: #ffcc80; }
        .tier-badge.tier-3 { background: #37474f; color: #b0bec5; }
        .tier-badge.tier-4 { background: #1a237e; color: #9fa8da; }
        .monument-card .flip-breakdown { font-size: 0.7em; color: #8899aa; margin-top: 2px; }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .monuments-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>CapybaraBot</h1>
        <span id="status-badge" class="status-badge status-stopped">INITIALIZING</span>
    </div>

    <div class="container">
        <div class="panel full-width">
            <h2>Controls</h2>
            <div class="controls">
                <button class="btn-pause" onclick="apiPost('/api/pause')">Pause</button>
                <button class="btn-resume" onclick="apiPost('/api/resume')">Resume</button>
                <button class="btn-stop" onclick="apiPost('/api/stop')">Stop</button>
            </div>
        </div>

        <div class="panel full-width">
            <h2>Statistics</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="value" id="stat-monuments">0</div>
                    <div class="label">Monuments Visited</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="stat-battles">0</div>
                    <div class="label">Battles Fought</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="stat-captured">0</div>
                    <div class="label">Captured</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="stat-defeats">0</div>
                    <div class="label">Defeats</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="stat-vision">0</div>
                    <div class="label">Vision Calls</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="stat-ocr">0</div>
                    <div class="label">OCR Reads</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="stat-errors">0</div>
                    <div class="label">Errors</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="stat-runtime">0:00</div>
                    <div class="label">Runtime</div>
                </div>
            </div>
        </div>

        <div class="panel full-width">
            <h2>Monuments</h2>
            <div class="monuments-grid" id="monuments-grid"></div>
        </div>

        <div class="panel">
            <h2>Live Screenshot</h2>
            <div class="screenshot-container">
                <div id="screenshot-area" class="no-image">No screenshot available</div>
            </div>
        </div>

        <div class="panel">
            <h2>Action Log</h2>
            <div id="action-log" class="action-log"></div>
        </div>

        <div class="panel full-width">
            <h2>System Logs</h2>
            <div id="system-log" class="log-container"></div>
        </div>
    </div>

    <script>
        function formatTime(ts) {
            const d = new Date(ts * 1000);
            return d.toLocaleTimeString();
        }

        function formatTimeSince(ts) {
            const secs = Math.floor(Date.now() / 1000 - ts);
            if (secs < 60) return `${secs}s ago`;
            if (secs < 3600) return `${Math.floor(secs / 60)}m ago`;
            return `${Math.floor(secs / 3600)}h${Math.floor((secs % 3600) / 60)}m ago`;
        }

        function formatRuntime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            return `${m}:${String(s).padStart(2,'0')}`;
        }

        async function apiPost(url) {
            try {
                await fetch(url, { method: 'POST' });
            } catch (e) {
                console.error('API call failed:', e);
            }
        }

        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                if (!res.ok) return;
                const data = await res.json();

                // State badge
                const badge = document.getElementById('status-badge');
                badge.textContent = data.state;
                badge.className = 'status-badge';
                if (data.paused) badge.classList.add('status-paused');
                else if (!data.running || data.state === 'STOPPED') badge.classList.add('status-stopped');
                else if (data.state === 'ERROR_RECOVERY') badge.classList.add('status-error');
                else badge.classList.add('status-running');

                // Stats
                const s = data.stats;
                document.getElementById('stat-monuments').textContent = s.monuments_visited;
                document.getElementById('stat-battles').textContent = s.battles_fought;
                document.getElementById('stat-captured').textContent = s.monuments_captured;
                document.getElementById('stat-defeats').textContent = s.defeats;
                document.getElementById('stat-vision').textContent = s.vision_calls;
                document.getElementById('stat-ocr').textContent = s.ocr_reads;
                document.getElementById('stat-errors').textContent = s.errors;
                document.getElementById('stat-runtime').textContent = formatRuntime(s.runtime_seconds);

                // Action log
                const logEl = document.getElementById('action-log');
                logEl.innerHTML = (data.action_log || []).slice(-30).reverse().map(e =>
                    `<div class="action-entry"><span class="time">${formatTime(e.time)}</span>${e.message}</div>`
                ).join('');

                // Monuments
                const grid = document.getElementById('monuments-grid');
                if (data.monuments) {
                    grid.innerHTML = Object.values(data.monuments).map(m => {
                        const ago = m.last_checked > 0
                            ? formatTimeSince(m.last_checked)
                            : 'Never';
                        const statusClass = m.last_status === 'unknown' ? '' : `status-${m.last_status}`;
                        const powerStr = m.garrison_power >= 0
                            ? m.garrison_power.toLocaleString()
                            : '?';
                        const defenders = (m.defender_names || []);
                        const defendersStr = defenders.length > 0
                            ? defenders.join(', ')
                            : '';
                        const velStr = m.flip_velocity > 0
                            ? `${m.flip_velocity.toFixed(1)}/hr`
                            : '';
                        const isContesting = data.state === 'CONTESTING'
                            && data.current_target
                            && data.current_target.slot === m.slot;
                        const tierLabels = {
                            0: 'WATCHING',
                            1: 'URGENT',
                            2: 'ATTACK',
                            3: 'CHECK',
                            4: 'SAFE',
                        };
                        const tierLabel = m.priority_tier >= 0
                            ? tierLabels[m.priority_tier] || `T${m.priority_tier}`
                            : '';
                        const tierBadge = tierLabel
                            ? `<span class="tier-badge tier-${m.priority_tier}">${tierLabel}</span>`
                            : '';
                        const f1h = m.flips_1h || 0;
                        const f6h = m.flips_6h || 0;
                        const f24h = m.flips_24h || 0;
                        const flipBreakdown = (f1h > 0 || f6h > 0 || f24h > 0)
                            ? `<div class="flip-breakdown">1h: ${f1h} | 6h: ${f6h} | 24h: ${f24h}</div>`
                            : '';
                        return `<div class="monument-card ${statusClass}">
                            <div class="slot-label">Slot ${m.slot}${tierBadge}${isContesting ? '<span class="contest-badge">CONTEST</span>' : ''}</div>
                            <div class="status-text ${m.last_status}">${m.last_status.toUpperCase()}</div>
                            <div class="owner">${m.owner_name || '\u2014'}</div>
                            <div class="garrison-info">Power: <span class="power-value">${powerStr}</span></div>
                            ${defendersStr ? `<div class="defenders-list">${defendersStr}</div>` : ''}
                            <div class="timer">Checked: ${ago}</div>
                            <div class="flip-count">Flips: ${m.flipped_to_enemy}${velStr ? ` <span class="flip-velocity">(${velStr})</span>` : ''}</div>
                            ${flipBreakdown}
                        </div>`;
                    }).join('');
                }

            } catch (e) { /* ignore */ }
        }

        async function updateScreenshot() {
            try {
                const res = await fetch('/api/screenshot');
                if (!res.ok) return;
                const data = await res.json();
                const area = document.getElementById('screenshot-area');
                if (data.image) {
                    area.innerHTML = `<img src="data:image/png;base64,${data.image}" alt="Screenshot">`;
                } else {
                    area.innerHTML = '<div class="no-image">No screenshot available</div>';
                }
            } catch (e) { /* ignore */ }
        }

        async function updateLogs() {
            try {
                const res = await fetch('/api/logs?limit=80');
                if (!res.ok) return;
                const data = await res.json();
                const logEl = document.getElementById('system-log');
                logEl.innerHTML = (data.logs || []).reverse().map(e =>
                    `<div class="log-entry"><span class="time">${formatTime(e.time)}</span><span class="level-${e.level}">[${e.level}]</span> ${e.message}</div>`
                ).join('');
            } catch (e) { /* ignore */ }
        }

        // Poll intervals
        setInterval(updateStatus, 2000);
        setInterval(updateScreenshot, 3000);
        setInterval(updateLogs, 4000);

        // Initial load
        updateStatus();
        updateScreenshot();
        updateLogs();
    </script>
</body>
</html>
